name: Lint log entries

on:
  push:
    paths:
      - "content/log/**"
      - "scripts/lint-log.mjs"
      - ".github/workflows/lint-log.yml"
  pull_request:
    paths:
      - "content/log/**"
      - "scripts/lint-log.mjs"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint:log
